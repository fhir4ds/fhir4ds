name: Deploy Website to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'docs/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/website/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Build WASM demo
        working-directory: web/wasm-demo
        run: |
          npm ci
          npm run build

      - name: Copy WASM demo to website static
        run: |
          mkdir -p web/website/static/wasm-app
          cp -r web/wasm-demo/dist/. web/website/static/wasm-app/

      - name: Install website dependencies
        working-directory: web/website
        run: npm ci

      - name: Build website
        working-directory: web/website
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/website/build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
