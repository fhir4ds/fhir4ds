<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#0ea5e9" opacity="0.15"/>
  <!-- DNA-like helix icon representing FHIR data -->
  <path d="M20 14 C28 20, 36 20, 44 14" stroke="#0ea5e9" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M20 50 C28 44, 36 44, 44 50" stroke="#0ea5e9" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Vertical connectors -->
  <line x1="20" y1="14" x2="20" y2="50" stroke="#38bdf8" stroke-width="2.5" stroke-dasharray="4,3"/>
  <line x1="44" y1="14" x2="44" y2="50" stroke="#38bdf8" stroke-width="2.5" stroke-dasharray="4,3"/>
  <!-- Cross bars -->
  <line x1="20" y1="26" x2="44" y2="26" stroke="#0ea5e9" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="20" y1="38" x2="44" y2="38" stroke="#0ea5e9" stroke-width="2.5" stroke-linecap="round"/>
  <!-- DuckDB icon hint - small duck shape -->
  <circle cx="32" cy="32" r="3" fill="#38bdf8"/>
</svg>
